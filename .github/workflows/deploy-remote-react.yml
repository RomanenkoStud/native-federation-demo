name: Deploy Remote React

on:
  push:
    branches: [main]
    paths:
      - 'remote-react/**'
      - '.github/workflows/deploy-remote-react.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: remote-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: remote-react

      - name: Build
        run: npx tsx build/build.ts
        working-directory: remote-react

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: remote-react/dist
          destination_dir: remote-react
          keep_files: true
