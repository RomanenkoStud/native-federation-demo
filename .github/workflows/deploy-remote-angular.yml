name: Deploy Remote Angular

on:
  push:
    branches: [main]
    paths:
      - 'remote-angular/**'
      - '.github/workflows/deploy-remote-angular.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: remote-angular/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: remote-angular

      - name: Build
        run: npx ng build
        working-directory: remote-angular

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: remote-angular/dist/activity/browser
          destination_dir: remote-angular
          keep_files: true
